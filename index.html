<!DOCTYPE html>
<html lang="en">
  <head>
    <title>My CV</title>
    <meta charset="utf-8">
    <style>
    	.content {
    		font-family: Arial;
    		font-size: 100px;
    		color: #1794a5;
    		text-align: center;
    	}

    	.pic {
            font-size: 36px;
            font-family: Arial;
    	}

    	.avatar {
    		border-radius: 10px;
			box-shadow: 0 0 10px #444;
            height: 70px;
    	}

        .logo {
            width: 150px;
            margin: 10px;
        }

        .year {
            position: absolute;
            bottom: 10px;
            margin-left: 48%;
            font-size: 21px;
            color:#1794a5;
        }

        header {
            display: flex;
            justify-content: space-between;
            background-color: #f6f9f9;
        }

        a {
            text-decoration: none;
            color: #095345;
            padding: 10px;
        }
    </style>
  </head>
  <body>
    <header>
      <div class="logo">
        <a href="https://rs.school/js/" target="_blank">
          <img src="rs_school_js.svg" alt="logo rolling scopes school"> 
        </a>
      </div>
      <div class="pic">
        <table>
            <tr>
                <td><img class="avatar" src="avt.png" alt="It's not really me"></td>
                <td><a href="https://github.com/lg0leg" target="_blank">lg0leg</a></td>
            </tr>
        </table>
      </div>  
    </header>
    <p class="content">I’m just learning</p>
    <footer>
        <div class="year">2021</div>
    </footer>
  </body>
</html>
